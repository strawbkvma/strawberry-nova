<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Strawberry Nova</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg1:#241934;
    --bg2:#3a2a55;
    --pink:#ff8fab;
    --pink-dark:#e85d88;
    --mint:#9fe8d8;
    --mint-dark:#5fb8a8;
    --lav:#c9a8e0;
    --cream:#fff6ec;
    --yellow:#ffd976;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; height:100%;
    background:radial-gradient(circle at 50% 0%, var(--bg2), var(--bg1) 70%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Nunito', sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .stage{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px; }
  .console{
    position:relative;
    width:min(94vw, 380px);
    aspect-ratio: 380/620;
    border-radius:28px;
    padding:10px;
    background:linear-gradient(155deg,#4a3768,#2a1e40);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.06) inset,
      0 18px 40px rgba(0,0,0,0.45),
      0 0 30px rgba(255,143,171,0.08);
  }
  canvas{
    display:block;
    width:100%; height:100%;
    border-radius:20px;
    background:#241934;
    touch-action:none;
    cursor:grab;
  }
  .overlay{
    position:absolute; inset:10px;
    border-radius:20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:24px;
    background:rgba(28,19,46,0.82);
    backdrop-filter:blur(2px);
    transition:opacity .25s ease;
  }
  .overlay.hidden{ opacity:0; pointer-events:none; }
  .title{
    font-family:'Press Start 2P', monospace;
    color:var(--cream);
    font-size:clamp(16px,5.2vw,22px);
    line-height:1.6;
    text-shadow: 2px 2px 0 var(--pink-dark), 0 0 18px rgba(159,232,216,0.5);
    letter-spacing:1px;
  }
  .subtitle{
    color:var(--mint);
    font-size:13px;
    font-weight:700;
    max-width:240px;
    opacity:0.9;
  }
  .hint-list{
    color:var(--cream);
    font-size:12px;
    opacity:0.75;
    max-width:230px;
    line-height:1.5;
  }
  button.play-btn{
    font-family:'Press Start 2P', monospace;
    font-size:13px;
    color:#3a1c2c;
    background:linear-gradient(180deg,var(--pink),var(--pink-dark));
    border:none;
    padding:14px 22px;
    border-radius:14px;
    cursor:pointer;
    box-shadow:0 6px 0 #a8395c, 0 10px 18px rgba(0,0,0,0.35);
    transition:transform .08s ease;
  }
  button.play-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #a8395c; }
  button.play-btn:focus-visible{ outline:3px solid var(--mint); outline-offset:3px; }
  .score-line{ color:var(--yellow); font-family:'Press Start 2P', monospace; font-size:12px; }
  .hint{
    color:var(--cream); opacity:0.55; font-size:11px; text-align:center; max-width:340px;
  }
  @media (prefers-reduced-motion: reduce){
    .overlay{ transition:none; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="console">
      <canvas id="game"></canvas>

      <div id="startOverlay" class="overlay">
        <div class="title">STRAWBERRY<br/>NOVA</div>
        <div class="subtitle">a cozy little dodge &amp; blast</div>
        <div class="hint-list">Drag your ship to fly · it auto-fires milk-drop blasts · dodge the crumb sparks</div>
        <button class="play-btn" id="startBtn">LAUNCH</button>
      </div>

      <div id="overOverlay" class="overlay hidden">
        <div class="title" style="font-size:clamp(14px,4.6vw,18px)">GAME OVER</div>
        <div class="score-line" id="finalScore">SCORE 0</div>
        <div class="score-line" id="bestScore" style="color:var(--mint)">BEST 0</div>
        <button class="play-btn" id="retryBtn">PLAY AGAIN</button>
      </div>
    </div>
    <p class="hint">Drag with your finger or mouse, or use ← → / A D · Space/Enter to start</p>
  </div>

<script>
(() => {
  const W = 380, H = 620;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;

  const startOverlay = document.getElementById('startOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');

  const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const COL = {
    pink:'#ff8fab', pinkDark:'#e85d88', pinkLight:'#ffd2dd',
    mint:'#9fe8d8', mintDark:'#5fb8a8',
    lav:'#c9a8e0', lavDark:'#9c7bc0',
    cream:'#fff6ec', yellow:'#ffd976', leaf:'#8fd49c'
  };
  const SPARKLE = ['#ffd2dd', '#9fe8d8', '#ffd976', '#c9a8e0', '#fff6ec'];

  // ---------- state ----------
  let state = 'start'; // start | playing | gameover
  let score = 0, highScore = 0, elapsed = 0;
  let last = 0;
  let spawnTimer = 1.0, powerupTimer = 14;

  let player, bullets, enemyBullets, enemies, particles, powerups;
  let keys = { left:false, right:false };
  let dragging = false;

  const stars = [];
  for (let i = 0; i < 70; i++) {
    stars.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.4+0.5,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.25+0.06
    });
  }
  const nebulae = [
    { x: W*0.2, y: H*0.18, r: 90, color: 'rgba(255,143,171,0.07)' },
    { x: W*0.85, y: H*0.4, r: 110, color: 'rgba(159,232,216,0.06)' },
    { x: W*0.3, y: H*0.78, r: 100, color: 'rgba(201,168,224,0.06)' }
  ];

  // ---------- storage ----------
  async function loadHighScore(){
    try{
      if (window.storage){
        const r = await window.storage.get('strawberry_nova_highscore');
        if (r && r.value) highScore = parseInt(r.value, 10) || 0;
      }
    }catch(e){ highScore = 0; }
  }
  async function saveHighScore(){
    try{
      if (window.storage) await window.storage.set('strawberry_nova_highscore', String(highScore));
    }catch(e){ /* ignore */ }
  }
  loadHighScore();

  // ---------- helpers ----------
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const rand = (a,b) => a + Math.random()*(b-a);

  function resetGame(){
    score = 0; elapsed = 0;
    spawnTimer = 1.0; powerupTimer = 14;
    player = { x: W/2, y: H-78, w: 34, h: 42, prevX: W/2, lives: 3, invuln: 0, fireCD: 0, doubleT: 0 };
    bullets = []; enemyBullets = []; enemies = []; particles = []; powerups = [];
  }

  function startGame(){
    resetGame();
    state = 'playing';
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
  }

  function endGame(){
    state = 'gameover';
    if (score > highScore){ highScore = score; saveHighScore(); }
    finalScoreEl.textContent = 'SCORE ' + score;
    bestScoreEl.textContent = 'BEST ' + highScore;
    overOverlay.classList.remove('hidden');
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  // ---------- input ----------
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter'){
      if (state === 'start' || state === 'gameover') startGame();
      e.preventDefault();
      return;
    }
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
  });

  function dragX(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    const x = (clientX - rect.left) * scaleX;
    if (player) player.x = clamp(x, player.w/2+4, W-player.w/2-4);
  }
  canvas.addEventListener('pointerdown', (e) => { dragging = true; dragX(e); });
  canvas.addEventListener('pointermove', (e) => { if (dragging) dragX(e); });
  window.addEventListener('pointerup', () => { dragging = false; });
  canvas.addEventListener('click', () => { if (state !== 'playing') startGame(); });

  // ---------- spawning ----------
  function spawnEnemy(){
    const big = Math.random() < 0.32;
    enemies.push({
      x: rand(28, W-28), y: -24,
      r: big ? 17 : 12,
      hp: big ? 2 : 1,
      speed: big ? rand(40,60) : rand(65,95),
      drift: rand(0.7,1.6) * (Math.random()<0.5?-1:1),
      wobble: rand(0, Math.PI*2),
      shootCD: big ? rand(1.4,2.4) : Infinity,
      value: big ? 30 : 10,
      color: big ? COL.lav : COL.mint,
      colorDark: big ? COL.lavDark : COL.mintDark
    });
  }

  function spawnPowerup(){
    powerups.push({ x: rand(40,W-40), y:-20, r:10, vy: rand(40,55), bob:0 });
  }

  function spawnParticles(x,y,n=10){
    const count = reducedMotion ? Math.ceil(n/2) : n;
    for (let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const sp = rand(40,140);
      particles.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        r: rand(1.5,3.2), life: rand(0.35,0.6), maxLife: 0.6,
        color: SPARKLE[Math.floor(Math.random()*SPARKLE.length)]
      });
    }
  }

  function spawnPlayerBullet(offset){
    bullets.push({ x: player.x+offset, y: player.y-player.h*0.45, r:4, speed: 360 });
  }

  function hitPlayer(){
    if (player.invuln > 0) return;
    player.lives -= 1;
    player.invuln = 1.3;
    spawnParticles(player.x, player.y, 8);
    if (player.lives <= 0) endGame();
  }

  function spawnInterval(){
    return Math.max(0.42, 1.05 - elapsed*0.009);
  }

  // ---------- update ----------
  function update(dt){
    // background always alive
    for (const s of stars){
      s.y += (reducedMotion ? s.speed*0.3 : s.speed) * dt * 18;
      if (s.y > H) s.y = 0;
    }

    if (state !== 'playing') return;
    elapsed += dt;

    // player movement
    const SPEED = 230;
    if (!dragging){
      if (keys.left) player.x -= SPEED*dt;
      if (keys.right) player.x += SPEED*dt;
    }
    player.x = clamp(player.x, player.w/2+4, W-player.w/2-4);
    player.invuln = Math.max(0, player.invuln - dt);
    player.doubleT = Math.max(0, player.doubleT - dt);

    // firing
    player.fireCD -= dt;
    if (player.fireCD <= 0){
      if (player.doubleT > 0){
        spawnPlayerBullet(-9);
        spawnPlayerBullet(9);
      } else {
        spawnPlayerBullet(0);
      }
      player.fireCD = player.doubleT > 0 ? 0.16 : 0.24;
    }

    // bullets
    for (const b of bullets) b.y -= b.speed*dt;
    bullets = bullets.filter(b => b.y > -10);

    // spawn enemies
    spawnTimer -= dt;
    if (spawnTimer <= 0){ spawnEnemy(); spawnTimer = spawnInterval(); }

    // powerups
    powerupTimer -= dt;
    if (powerupTimer <= 0){ spawnPowerup(); powerupTimer = rand(16,22); }
    for (const p of powerups){
      p.y += p.vy*dt;
      p.bob += dt*4;
    }
    powerups = powerups.filter(p => {
      if (p.y > H+20) return false;
      const dx = p.x-player.x, dy = p.y-player.y;
      if (dx*dx+dy*dy < (p.r+18)*(p.r+18)){
        player.doubleT = 8;
        score += 20;
        spawnParticles(p.x,p.y,10);
        return false;
      }
      return true;
    });

    // enemies
    for (const en of enemies){
      en.y += en.speed*dt;
      en.x += Math.sin(elapsed*1.4 + en.wobble) * en.drift;
      en.x = clamp(en.x, en.r, W-en.r);
      if (en.shootCD !== Infinity){
        en.shootCD -= dt;
        if (en.shootCD <= 0){
          enemyBullets.push({ x:en.x, y:en.y+en.r, vy: 150, r:3.5 });
          en.shootCD = rand(1.8,2.8);
        }
      }
    }
    enemies = enemies.filter(en => en.y - en.r <= H); // despawn quietly off-screen

    // enemy bullets
    for (const eb of enemyBullets) eb.y += eb.vy*dt;
    enemyBullets = enemyBullets.filter(eb => {
      if (eb.y > H+10) return false;
      const dx = eb.x-player.x, dy = eb.y-player.y;
      if (dx*dx+dy*dy < (eb.r+player.w*0.32)*(eb.r+player.w*0.32)){
        hitPlayer();
        return false;
      }
      return true;
    });

    // bullet vs enemy
    for (const b of bullets){
      for (const en of enemies){
        if (en.hp <= 0) continue;
        const dx = b.x-en.x, dy = b.y-en.y;
        if (dx*dx+dy*dy < (b.r+en.r)*(b.r+en.r)){
          en.hp -= 1;
          b.y = -999;
          if (en.hp <= 0){
            score += en.value;
            spawnParticles(en.x, en.y, 10);
          }
        }
      }
    }
    bullets = bullets.filter(b => b.y > -100);
    enemies = enemies.filter(en => en.hp > 0);

    // enemy vs player (direct contact)
    for (const en of enemies){
      const dx = en.x-player.x, dy = en.y-player.y;
      if (dx*dx+dy*dy < (en.r+player.w*0.34)*(en.r+player.w*0.34)){
        en.hp = 0;
        spawnParticles(en.x,en.y,8);
        hitPlayer();
      }
    }
    enemies = enemies.filter(en => en.hp > 0);

    // particles
    for (const p of particles){
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);

    const tilt = clamp((player.x - player.prevX)*0.6, -1, 1);
    player.tilt = tilt;
    player.prevX = player.x;
  }

  // ---------- drawing ----------
  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2c1f47');
    g.addColorStop(1,'#1b1330');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    for (const n of nebulae){
      const rg = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      rg.addColorStop(0, n.color);
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    }

    for (const s of stars){
      const a = 0.35 + 0.55*Math.abs(Math.sin(elapsed*1.6*s.speed*4 + s.phase));
      ctx.fillStyle = `rgba(255,246,236,${a})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
  }

  function drawShip(p){
    const { x, y, w, h, tilt } = p;
    const blink = p.invuln > 0 && Math.floor(p.invuln*10) % 2 === 0;
    if (blink) return;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate((tilt||0)*0.25);

    ctx.beginPath();
    ctx.moveTo(0,-h*0.5);
    ctx.bezierCurveTo(w*0.55,-h*0.28, w*0.42,h*0.42, 0,h*0.5);
    ctx.bezierCurveTo(-w*0.42,h*0.42, -w*0.55,-h*0.28, 0,-h*0.5);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0,-h*0.5,0,h*0.5);
    grad.addColorStop(0, COL.pinkLight);
    grad.addColorStop(1, COL.pink);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = COL.pinkDark;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = COL.pinkLight;
    const seeds = [[-6,-2],[5,2],[-3,10],[4,12],[0,-6]];
    for (const [sx,sy] of seeds){
      ctx.beginPath(); ctx.ellipse(sx,sy,1.4,2.2,0.3,0,Math.PI*2); ctx.fill();
    }

    ctx.fillStyle = COL.leaf;
    ctx.beginPath(); ctx.ellipse(-5,-h*0.46,5,8,-0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-h*0.46,5,8,0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-h*0.5,5,9,0,0,Math.PI*2); ctx.fill();

    if (p.doubleT > 0){
      ctx.shadowColor = COL.yellow;
      ctx.shadowBlur = 10;
      ctx.strokeStyle = 'rgba(255,217,118,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(0,2,w*0.62,h*0.62,0,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  function drawCrumb(en){
    ctx.save();
    ctx.translate(en.x,en.y);
    ctx.beginPath();
    const pts = 9;
    for (let i=0;i<=pts;i++){
      const a = (i/pts)*Math.PI*2;
      const rad = en.r * (0.82 + 0.18*Math.sin(a*3 + en.wobble + elapsed*2));
      const px = Math.cos(a)*rad, py = Math.sin(a)*rad;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle = en.color;
    ctx.fill();
    ctx.strokeStyle = en.colorDark;
    ctx.lineWidth = 1.6;
    ctx.stroke();

    ctx.fillStyle = '#2b1e3f';
    ctx.beginPath(); ctx.arc(-en.r*0.32, -en.r*0.08, en.r*0.16, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(en.r*0.32, -en.r*0.08, en.r*0.16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-en.r*0.32-0.6, -en.r*0.14, en.r*0.05, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(en.r*0.32-0.6, -en.r*0.14, en.r*0.05, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawBullets(){
    for (const b of bullets){
      ctx.save();
      ctx.shadowColor = COL.cream;
      ctx.shadowBlur = 6;
      ctx.fillStyle = COL.cream;
      ctx.beginPath(); ctx.ellipse(b.x,b.y,b.r*0.7,b.r*1.3,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    for (const eb of enemyBullets){
      ctx.save();
      ctx.shadowColor = COL.lav;
      ctx.shadowBlur = 6;
      ctx.fillStyle = COL.lav;
      ctx.beginPath(); ctx.arc(eb.x,eb.y,eb.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function drawPowerups(){
    for (const p of powerups){
      const bob = Math.sin(p.bob)*3;
      ctx.save();
      ctx.translate(p.x, p.y+bob);
      ctx.shadowColor = COL.yellow;
      ctx.shadowBlur = 8;
      ctx.fillStyle = COL.cream;
      ctx.beginPath();
      ctx.moveTo(0,-p.r);
      ctx.bezierCurveTo(p.r*0.9,-p.r*0.1, p.r*0.7,p.r*0.9, 0,p.r);
      ctx.bezierCurveTo(-p.r*0.7,p.r*0.9, -p.r*0.9,-p.r*0.1, 0,-p.r);
      ctx.fill();
      ctx.strokeStyle = COL.yellow;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawParticles(){
    for (const p of particles){
      const a = Math.max(0, p.life/p.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawMiniStrawberry(x,y,s){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s,s);
    ctx.beginPath();
    ctx.moveTo(0,-7);
    ctx.bezierCurveTo(7,-4, 6,6, 0,7);
    ctx.bezierCurveTo(-6,6, -7,-4, 0,-7);
    ctx.closePath();
    ctx.fillStyle = COL.pink;
    ctx.fill();
    ctx.fillStyle = COL.leaf;
    ctx.beginPath(); ctx.ellipse(0,-7,3.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawHUD(){
    ctx.font = "12px 'Press Start 2P', monospace";
    ctx.textAlign = 'left';
    ctx.fillStyle = COL.yellow;
    ctx.fillText('SCORE ' + score, 14, 24);
    ctx.textAlign = 'right';
    ctx.fillStyle = COL.mint;
    ctx.fillText('BEST ' + Math.max(highScore, score), W-14, 24);
    ctx.textAlign = 'left';

    for (let i=0;i<3;i++){
      const filled = i < player.lives;
      ctx.globalAlpha = filled ? 1 : 0.25;
      drawMiniStrawberry(W/2 - 24 + i*22, 18, 1);
      ctx.globalAlpha = 1;
    }
  }

  function render(){
    drawBackground();
    if (state === 'playing' || state === 'gameover'){
      drawPowerups();
      for (const en of enemies) drawCrumb(en);
      drawBullets();
      drawParticles();
      if (player) drawShip(player);
      drawHUD();
    }
  }

  // ---------- loop ----------
  function loop(ts){
    if (!last) last = ts;
    const dt = Math.min((ts-last)/1000, 0.05);
    last = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
